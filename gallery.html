<!doctype html>
<html lang="en-IN">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Gallery | Sample Gym</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Inter:wght@400;500;700&family=Montserrat:wght@700;800;900&family=Poppins:wght@500;600;700&display=swap" rel="stylesheet" />
<link rel="stylesheet" href="styles.css" />
</head>
<body>
<div data-shell>
<section class="page-hero">
  <div class="container reveal">
    <h1>OUR GYM</h1>
    <p class="lead">Real equipment. Real atmosphere. Real results.</p>
  </div>
</section>

<section class="section">
  <div class="container">
    <div class="btn-row reveal" style="justify-content:center">
      <button class="btn btn-outline active-tab" data-filter="all" type="button">All</button>
      <button class="btn btn-ghost" data-filter="equipment" type="button">Equipment</button>
      <button class="btn btn-ghost" data-filter="training" type="button">Training</button>
      <button class="btn btn-ghost" data-filter="group" type="button">Group Classes</button>
      <button class="btn btn-ghost" data-filter="events" type="button">Events</button>
    </div>

    <div class="gallery-grid reveal" style="margin-top:24px">
      <article class="gallery-item" data-lightbox data-category="equipment" data-caption="Power racks and free weights"><img src="https://images.unsplash.com/photo-1570829460005-c840387bb1ca?auto=format&fit=crop&w=900&q=80" alt="Equipment zone" /></article>
      <article class="gallery-item" data-lightbox data-category="training" data-caption="Deadlift session"><img src="https://images.unsplash.com/photo-1532029837206-abbe2b7620e3?auto=format&fit=crop&w=900&q=80" alt="Deadlift training" /></article>
      <article class="gallery-item" data-lightbox data-category="group" data-caption="Group circuit class"><img src="https://images.unsplash.com/photo-1517836357463-d25dfeac3438?auto=format&fit=crop&w=900&q=80" alt="Group class" /></article>
      <article class="gallery-item" data-lightbox data-category="training" data-caption="Trainer coaching 1-on-1"><img src="https://images.unsplash.com/photo-1581009137042-c552e485697a?auto=format&fit=crop&w=900&q=80" alt="Personal training" /></article>
      <article class="gallery-item" data-lightbox data-category="equipment" data-caption="Strength floor"><img src="https://images.unsplash.com/photo-1599058917212-d750089bc07e?auto=format&fit=crop&w=900&q=80" alt="Gym floor" /></article>
      <article class="gallery-item" data-lightbox data-category="events" data-caption="Weekend challenge event"><img src="https://images.unsplash.com/photo-1434682966726-19ad3ad05d37?auto=format&fit=crop&w=900&q=80" alt="Gym event" /></article>
    </div>

    <div style="text-align:center;margin-top:28px" class="reveal">
      <h3>Want to see it in person? Book a free visit.</h3>
      <a class="btn btn-primary" href="https://wa.me/910000000000?text=Hi!%20I%20want%20to%20book%20a%20free%20visit.">Book Free Visit</a>
    </div>
  </div>
</section>

<div class="modal" id="lightbox" role="dialog" aria-modal="true" aria-label="Gallery preview">
  <div class="modal-content lightbox-content">
    <button class="modal-close" id="lightboxClose" type="button" aria-label="Close">x</button>
    <img id="lightboxImage" src="" alt="" />
    <p id="lightboxCaption" class="muted"></p>
  </div>
</div>
</div>
<script src="app.js" defer></script>
</body>
</html>
